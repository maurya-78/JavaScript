<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body style="background-color:#212121; color:white">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
      function addLaguage(langName){
       const li = document.createElement("li");
       li.innerText = `${langName}`;
       document.querySelector(".language").appendChild(li);
      }
      addLaguage("Python")
      addLaguage("Java")
      addLaguage("C++")
      addLaguage("C")
      addLaguage("C#")

      function addOptiLanguge(langName){
        const li = document.createElement("li");
        li.appendChild = (document.createTextNode(langName ))
        document.querySelector(".language").appendChild(li);
      }
    addOptiLanguge('golang')


    // Edit 

    const seclang = document.querySelector('li:nth-child(2)')
    //seclang.innerHTML= "Ruby"

    const newli = document.createElement('li')
    newli.textContent = "Mongoose"
    seclang.replaceWith(newli)

    //edit

    const lastLang = document.querySelector('li:last-child')
    lastLang.outerHTML = '<li>TypeScript</li>'

    // remove

    const removeLang = document.querySelector('li:last-child')
    removeLang.remove()
    
</script>
</html>
